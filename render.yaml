services:
  - type: web
    name: dgram-ai
    runtime: docker
    plan: free
    healthCheckPath: /api/health

    envVars:
      - key: GROQ_API_KEY
        sync: false              # set manually in Render dashboard

      - key: SESSION_SECRET
        generateValue: true      # Render auto-generates a strong secret

      - key: GOOGLE_CLIENT_ID
        sync: false              # paste from Google Cloud Console

      - key: GOOGLE_CLIENT_SECRET
        sync: false              # paste from Google Cloud Console

      - key: DATABASE_URL
        sync: false              # Neon PostgreSQL connection string (postgresql://...)

      - key: ADMIN_EMAIL
        sync: false              # your Google email — grants access to /admin
